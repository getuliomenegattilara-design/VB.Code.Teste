<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Supabase</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pessoas">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --accent: #3ecf8e;
            --accent-dark: #2bb37a;
            --bg: #0f1117;
            --surface: #1c1c27;
            --surface2: #26263a;
            --text: #e2e8f0;
            --muted: #8892a4;
            --border: #2e2e45;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex; align-items: center; gap: 12px;
        }
        .topbar .logo {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px;
        }
        .topbar h5 { margin: 0; font-weight: 700; font-size: 17px; }
        .topbar span { color: var(--muted); font-size: 13px; }

        .main-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        .card-top {
            background: var(--surface2);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
        }
        .card-top-left { display: flex; align-items: center; gap: 10px; }
        .card-top h6 { margin: 0; font-weight: 600; font-size: 15px; }
        .icon-box {
            width: 32px; height: 32px;
            background: rgba(62,207,142,0.15);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 16px; flex-shrink: 0;
        }

        .form-control, .input-group-text {
            background: var(--surface2) !important;
            border-color: var(--border) !important;
            color: var(--text) !important;
        }
        .form-control::placeholder { color: var(--muted) !important; }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(62,207,142,0.2) !important;
            border-color: var(--accent) !important;
        }
        .input-group-text { color: var(--muted) !important; }

        .btn-accent {
            background: var(--accent); border: none; color: #fff;
            font-weight: 600; padding: 8px 22px; border-radius: 8px; transition: background 0.2s;
        }
        .btn-accent:hover { background: var(--accent-dark); color: #fff; }

        .section-label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--muted); font-weight: 700; margin-bottom: 8px;
        }

        /* Busca */
        .search-wrap { display: flex; gap: 6px; align-items: center; }
        .search-wrap .form-control { width: 200px; padding: 5px 10px; font-size: 13px; border-radius: 6px; }
        .btn-search {
            background: rgba(62,207,142,0.15); color: var(--accent);
            border: 1px solid rgba(62,207,142,0.3); border-radius: 6px;
            padding: 5px 10px; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .btn-search:hover { background: rgba(62,207,142,0.3); }
        .btn-clear {
            background: transparent; color: var(--muted);
            border: 1px solid var(--border); border-radius: 6px;
            padding: 5px 10px; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .btn-clear:hover { color: var(--text); }

        /* Tabela */
        .dark-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .dark-table thead th {
            background: var(--surface2); color: var(--muted); font-weight: 600;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
            padding: 8px 12px; border-bottom: 1px solid var(--border);
        }
        .dark-table tbody td {
            padding: 6px 12px; border-bottom: 1px solid var(--border);
            color: var(--text); vertical-align: middle;
        }
        .dark-table tbody tr:last-child td { border-bottom: none; }
        .dark-table tbody tr:hover { background: rgba(255,255,255,0.02); }

        .id-badge {
            display: inline-block; background: rgba(62,207,142,0.12);
            color: var(--accent); border-radius: 4px; padding: 1px 7px;
            font-weight: 700; font-size: 12px;
        }
        .date-text { color: var(--muted); font-size: 12px; }

        .btn-edit {
            background: transparent; color: #60a5fa; border: none;
            border-radius: 4px; padding: 2px 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .btn-edit:hover { background: rgba(59,130,246,0.15); }
        .btn-del {
            background: transparent; color: #f87171; border: none;
            border-radius: 4px; padding: 2px 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .btn-del:hover { background: rgba(239,68,68,0.15); }

        /* Paginacao */
        .pag-wrap {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted);
        }
        .pag-links { display: flex; gap: 4px; }
        .pag-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer; color: var(--muted); border: 1px solid var(--border);
            background: transparent; transition: all 0.2s;
        }
        .pag-btn:hover { background: var(--surface2); color: var(--text); }
        .pag-btn.ativo { background: var(--accent); border-color: var(--accent); color: #fff; }
        .pag-btn.desab { opacity: 0.35; pointer-events: none; cursor: default; }

        /* Alertas */
        .alert-ok {
            background: rgba(62,207,142,0.1); border: 1px solid rgba(62,207,142,0.3);
            color: #6ee7b7; border-radius: 10px; padding: 12px 16px; font-size: 14px;
        }
        .alert-err {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5; border-radius: 10px; padding: 12px 16px; font-size: 14px;
        }

        /* Modal */
        .modal-content {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text);
        }
        .modal-header { border-bottom: 1px solid var(--border); padding: 18px 24px; }
        .modal-footer { border-top: 1px solid var(--border); }
        .modal-title { font-weight: 700; font-size: 16px; }
        .btn-close { filter: invert(1); }
    </style>
</head>
<body>

<div class="topbar mb-4">
    <div class="logo"><i class="bi bi-people-fill"></i></div>
    <div>
        <h5>Pessoas <span style="font-size:12px;color:var(--accent);font-weight:400">via Supabase</span></h5>
        <span>Cadastro com banco na nuvem</span>
    </div>
</div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div id="alerta" class="mb-3" style="display:none"></div>

            <!-- Card cadastro -->
            <div class="main-card mb-4">
                <div class="card-top">
                    <div class="card-top-left">
                        <div class="icon-box"><i class="bi bi-person-plus"></i></div>
                        <h6>Novo Cadastro</h6>
                    </div>
                </div>
                <div class="p-4">
                    <div class="section-label">Nome da pessoa</div>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="txtNome" placeholder="Digite o nome completo..." maxlength="100">
                        <button class="btn btn-accent" onclick="gravar()">
                            <i class="bi bi-floppy me-1"></i> Gravar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Card grid -->
            <div class="main-card">
                <div class="card-top">
                    <div class="card-top-left">
                        <div class="icon-box"><i class="bi bi-list-ul"></i></div>
                        <h6>Registros <span id="totalLabel" style="color:var(--muted);font-weight:400;font-size:13px;margin-left:6px"></span></h6>
                    </div>
                    <div class="search-wrap">
                        <input type="text" class="form-control" id="txtBusca" placeholder="Buscar nome...">
                        <button class="btn-search" onclick="buscar()"><i class="bi bi-search"></i></button>
                        <button class="btn-clear" onclick="limparBusca()" id="btnLimpar" style="display:none"><i class="bi bi-x-lg"></i></button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="dark-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Cadastrado em</th>
                                <th style="width:120px;text-align:center">Acoes</th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>

                <div class="pag-wrap">
                    <span id="pagInfo">Pagina 1</span>
                    <div class="pag-links" id="pagLinks"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Modal Editar -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2 text-info"></i>Editar Pessoa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="section-label">Nome</div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="editNome" maxlength="100">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-accent" onclick="salvarEdicao()"><i class="bi bi-floppy me-1"></i> Salvar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Delete -->
<div class="modal fade" id="modalDeletar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-trash me-2 text-danger"></i>Confirmar exclusao</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <p style="color:var(--muted);font-size:14px">Deseja excluir <strong id="delNome" style="color:var(--text)"></strong>?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" onclick="confirmarDeletar()"><i class="bi bi-trash me-1"></i> Excluir</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // =============================================
    // Configuracao Supabase
    // =============================================
    const SUPA_URL = 'https://hzeysduzokgaydfafvpu.supabase.co';
    const SUPA_KEY = 'sb_publishable_s6QlSPmr-f5jvGDORfiRXA_MnDF4pPH';
    const TABELA  = 'pessoas';
    const PAGE_SIZE = 10;

    // =============================================
    // Estado
    // =============================================
    let pagina    = 1;
    let totalPag  = 1;
    let totalReg  = 0;
    let buscaAtual = '';
    let editId    = null;
    let delId     = null;

    const modalEditar  = new bootstrap.Modal(document.getElementById('modalEditar'));
    const modalDeletar = new bootstrap.Modal(document.getElementById('modalDeletar'));

    // =============================================
    // API Supabase
    // =============================================
    async function supaFetch(path, options = {}) {
        const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
            ...options,
            headers: {
                'apikey': SUPA_KEY,
                'Authorization': 'Bearer ' + SUPA_KEY,
                'Content-Type': 'application/json',
                'Prefer': options.prefer || '',
                ...(options.headers || {})
            }
        });
        const text = await res.text();
        if (!text) return null;
        return JSON.parse(text);
    }

    // =============================================
    // Carregar grid
    // =============================================
    async function carregar() {
        const offset = (pagina - 1) * PAGE_SIZE;

        let filtro = buscaAtual ? `&nome=ilike.*${encodeURIComponent(buscaAtual)}*` : '';

        // Contar total
        const countRes = await fetch(
            `${SUPA_URL}/rest/v1/${TABELA}?select=id${filtro}`,
            {
                headers: {
                    'apikey': SUPA_KEY,
                    'Authorization': 'Bearer ' + SUPA_KEY,
                    'Prefer': 'count=exact',
                    'Range': '0-0'
                }
            }
        );
        const range = countRes.headers.get('content-range');
        totalReg = range ? parseInt(range.split('/')[1]) : 0;
        totalPag = Math.max(1, Math.ceil(totalReg / PAGE_SIZE));
        if (pagina > totalPag) pagina = totalPag;

        document.getElementById('totalLabel').textContent =
            '(' + totalReg + ' encontrado' + (totalReg !== 1 ? 's' : '') + ')';

        // Buscar registros da pagina
        const dados = await supaFetch(
            `${TABELA}?select=id,nome,datacadastro${filtro}&order=id.desc&offset=${offset}&limit=${PAGE_SIZE}`
        );

        renderTabela(dados || []);
        renderPaginacao();
    }

    function renderTabela(dados) {
        const tbody = document.getElementById('tbody');
        if (!dados.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#64748b;padding:30px;font-style:italic">Nenhum registro encontrado.</td></tr>';
            return;
        }
        tbody.innerHTML = dados.map(r => `
            <tr>
                <td><span class="id-badge">${r.id}</span></td>
                <td>${escHtml(r.nome)}</td>
                <td><span class="date-text">${formatData(r.datacadastro)}</span></td>
                <td style="text-align:center">
                    <button class="btn-edit me-1" onclick="abrirEditar(${r.id}, '${escJs(r.nome)}')"><i class="bi bi-pencil"></i> Editar</button>
                    <button class="btn-del" onclick="abrirDeletar(${r.id}, '${escJs(r.nome)}')"><i class="bi bi-trash"></i> Apagar</button>
                </td>
            </tr>
        `).join('');
    }

    function renderPaginacao() {
        document.getElementById('pagInfo').textContent = 'Pagina ' + pagina + ' de ' + totalPag;
        const wrap = document.getElementById('pagLinks');
        let html = '';
        html += pagina <= 1
            ? '<span class="pag-btn desab"><i class="bi bi-chevron-left"></i></span>'
            : `<span class="pag-btn" onclick="irPagina(${pagina-1})"><i class="bi bi-chevron-left"></i></span>`;
        for (let p = 1; p <= totalPag; p++) {
            html += `<span class="pag-btn ${p===pagina?'ativo':''}" onclick="irPagina(${p})">${p}</span>`;
        }
        html += pagina >= totalPag
            ? '<span class="pag-btn desab"><i class="bi bi-chevron-right"></i></span>'
            : `<span class="pag-btn" onclick="irPagina(${pagina+1})"><i class="bi bi-chevron-right"></i></span>`;
        wrap.innerHTML = html;
    }

    function irPagina(p) { pagina = p; carregar(); }

    // =============================================
    // GRAVAR
    // =============================================
    async function gravar() {
        const nome = document.getElementById('txtNome').value.trim();
        if (!nome) { mostrarAlerta('erro', 'Informe um nome antes de gravar.'); return; }

        const btn = document.querySelector('.btn-accent');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Gravando...';

        try {
            await supaFetch(TABELA, {
                method: 'POST',
                prefer: 'return=minimal',
                body: JSON.stringify({ nome })
            });
            document.getElementById('txtNome').value = '';
            pagina = 1;
            mostrarAlerta('ok', 'Pessoa cadastrada com sucesso!');
            carregar();
        } catch (e) {
            mostrarAlerta('erro', 'Erro ao gravar: ' + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-floppy me-1"></i> Gravar';
        }
    }

    // =============================================
    // EDITAR
    // =============================================
    function abrirEditar(id, nome) {
        editId = id;
        document.getElementById('editNome').value = nome;
        modalEditar.show();
    }

    async function salvarEdicao() {
        const nome = document.getElementById('editNome').value.trim();
        if (!nome) { mostrarAlerta('erro', 'Informe o nome.'); return; }
        await supaFetch(`${TABELA}?id=eq.${editId}`, {
            method: 'PATCH',
            prefer: 'return=minimal',
            body: JSON.stringify({ nome })
        });
        modalEditar.hide();
        mostrarAlerta('ok', 'Registro alterado com sucesso!');
        carregar();
    }

    // =============================================
    // APAGAR
    // =============================================
    function abrirDeletar(id, nome) {
        delId = id;
        document.getElementById('delNome').textContent = nome;
        modalDeletar.show();
    }

    async function confirmarDeletar() {
        await supaFetch(`${TABELA}?id=eq.${delId}`, {
            method: 'DELETE',
            noBody: true,
            prefer: 'return=minimal'
        });
        modalDeletar.hide();
        mostrarAlerta('ok', 'Registro excluido com sucesso!');
        carregar();
    }

    // =============================================
    // BUSCA
    // =============================================
    function buscar() {
        buscaAtual = document.getElementById('txtBusca').value.trim();
        document.getElementById('btnLimpar').style.display = buscaAtual ? '' : 'none';
        pagina = 1;
        carregar();
    }

    function limparBusca() {
        buscaAtual = '';
        document.getElementById('txtBusca').value = '';
        document.getElementById('btnLimpar').style.display = 'none';
        pagina = 1;
        carregar();
    }

    document.getElementById('txtBusca').addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });
    document.getElementById('txtNome').addEventListener('keydown', e => { if (e.key === 'Enter') gravar(); });

    // =============================================
    // Helpers
    // =============================================
    function mostrarAlerta(tipo, texto) {
        const el = document.getElementById('alerta');
        el.className = tipo === 'ok' ? 'alert-ok mb-3' : 'alert-err mb-3';
        el.innerHTML = `<i class="bi bi-${tipo==='ok'?'check-circle-fill':'exclamation-triangle-fill'} me-2"></i>${texto}`;
        el.style.display = '';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escJs(str) {
        return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }

    function formatData(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    }

    // =============================================
    // Iniciar
    // =============================================
    carregar();

    // Registrar Service Worker (PWA)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
